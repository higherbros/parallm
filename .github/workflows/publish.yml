name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: npm / Node 24
    if: github.repository == 'higherbros/parallm'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: npm
      url: https://www.npmjs.com/package/parallm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out released revision
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify release metadata
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"

          if [[ "${RELEASE_TAG}" != "${expected_tag}" ]]; then
            echo "::error title=Release tag mismatch::Expected ${expected_tag}, received ${RELEASE_TAG}."
            exit 1
          fi

          version_is_prerelease=false
          if [[ "${package_version}" == *-* ]]; then
            version_is_prerelease=true
          fi

          if [[ "${RELEASE_IS_PRERELEASE}" != "${version_is_prerelease}" ]]; then
            echo "::error title=Prerelease mismatch::package.json prerelease state does not match the GitHub release."
            exit 1
          fi
      - name: Run full quality gate
        run: pnpm run test:all
      - name: Verify packed installation
        run: pnpm run smoke:package
      - name: Audit production dependencies
        run: pnpm audit --prod
      - name: Publish package
        env:
          RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          set -euo pipefail
          if [[ "${RELEASE_IS_PRERELEASE}" == "true" ]]; then
            npm publish --access public --provenance --tag next
          else
            npm publish --access public --provenance
          fi
